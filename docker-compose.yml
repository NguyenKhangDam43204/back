version: '3.8'

networks:
  tmdt-network:
    driver: bridge
    name: tmdt-network

volumes:
  mysql_data:

services:
  # ─── RABBITMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq_tmdt
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: tmdt
      RABBITMQ_DEFAULT_PASS: tmdt2026
    networks:
      - tmdt-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MYSQL ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: mysql_tmdt
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tmdt-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── API GATEWAY ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: tmdt
        HAS_PRISMA: "false"
    container_name: api_gateway_tmdt
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      RABBITMQ_URL: amqp://tmdt:tmdt2026@rabbitmq:5672
      USER_QUEUE: user_queue
      PRODUCT_QUEUE: product_queue
      ORDER_QUEUE: order_queue
      PAYMENT_QUEUE: payment_queue
      PROMOTION_QUEUE: promotion_queue
      REVIEW_QUEUE: review_queue
      CONFIG_QUEUE: config_queue
      NOTIFICATION_QUEUE: notification_queue
      INVENTORY_QUEUE: inventory_queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - tmdt-network

  # ─── USER SERVICE ──────────────────────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: user-service
        HAS_PRISMA: "true"
    container_name: user_service_tmdt
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      # ✅ Thống nhất tên biến
      RABBITMQ_URL: amqp://tmdt:tmdt2026@rabbitmq:5672
      RABBITMQ_QUEUE: user_queue
      DATABASE_URL: mysql://root:password@mysql:3306/db_users
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - tmdt-network

  # ─── REVIEW SERVICE ────────────────────────────────────────────────────────
  review-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: review-service
        HAS_PRISMA: "true"
    container_name: review_service_tmdt
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      RABBITMQ_URL: amqp://tmdt:tmdt2026@rabbitmq:5672
      RABBITMQ_QUEUE: review_queue
      DATABASE_URL: mysql://root:password@mysql:3306/db_reviews
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - tmdt-network

  # ─── INVENTORY SERVICE ─────────────────────────────────────────────────────
  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: inventory-service
        HAS_PRISMA: "true"
    container_name: inventory_service_tmdt
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      # ✅ Fix: Thống nhất RABBITMQ_URL (bỏ RABBITMQ_URI)
      RABBITMQ_URL: amqp://tmdt:tmdt2026@rabbitmq:5672
      INVENTORY_QUEUE: inventory_queue
      DATABASE_URL: mysql://root:password@mysql:3306/db_inventory
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - tmdt-network